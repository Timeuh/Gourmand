services:
  app:
    container_name: gourmand-app
    build:
      context: .
      target: dev
    env_file:
      - .env
    volumes:
      - .:/app
      - ./node_modules:/app/node_modules
    working_dir: /app
    restart: unless-stopped
    ports:
      - 3000:3000
    networks:
      - gourmand-network

  database:
    image: postgres
    container_name: gourmand-database
    restart: unless-stopped
    env_file:
      - .env
    networks:
      - gourmand-network

  adminer:
    image: adminer
    container_name: gourmand-adminer
    restart: unless-stopped
    ports:
      - "8080:8080"
    networks:
      - gourmand-network

networks:
  gourmand-network:
    driver: bridge
