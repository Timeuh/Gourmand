info:
  name: upload image
  type: http
  seq: 1

http:
  method: POST
  url: http://localhost:3000/api/images
  body:
    type: multipart-form
    data:
      - name: image
        type: file
        value:
          - /run/user/1000/doc/f8eb2a3e/test_image.jpeg
        contentType: image/jpeg
      - name: filename
        type: text
        value: 1_test_image.jpeg
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
